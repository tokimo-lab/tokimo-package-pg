name: Build PostgreSQL + pgvector

on:
  workflow_dispatch:
    inputs:
      pg_version:
        description: 'PostgreSQL version (git tag, e.g. REL_18_3)'
        required: true
        default: 'REL_18_3'
      pgvector_version:
        description: 'pgvector version (git tag, e.g. v0.8.2)'
        required: true
        default: 'v0.8.2'
      ssl:
        description: 'Build with OpenSSL support'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  build:
    name: PG ${{ inputs.pg_version }} + pgvector (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            runner: windows-latest
            os: windows
          - target: macos-arm64
            runner: macos-14
            os: macos

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90

    env:
      PG_VERSION: ${{ inputs.pg_version || 'REL_18_3' }}
      PGVECTOR_VERSION: ${{ inputs.pgvector_version || 'v0.8.2' }}
      PG_INSTALL_DIR: ${{ github.workspace }}/pg-install
      ARTIFACT_NAME: pg-${{ inputs.pg_version || 'REL_18_3' }}-${{ matrix.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute release tag
        shell: bash
        run: |
          PG_VER="$(echo "$PG_VERSION" | sed 's/REL_//' | tr '_' '.')"
          VEC_VER="$(echo "$PGVECTOR_VERSION" | sed 's/^v//')"
          RELEASE_TAG="pg${PG_VER}-vec${VEC_VER}"
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          echo "Computed release tag: $RELEASE_TAG"

      # ==================== WINDOWS ====================
      - name: Install build tools (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install meson ninja
          choco install winflexbison3 --no-progress -y
          choco install pkgconfiglite --no-progress -y

      - name: Install OpenSSL (Windows)
        if: matrix.os == 'windows' && inputs.ssl == 'true'
        shell: pwsh
        run: |
          choco install openssl --no-progress -y
          echo "OPENSSL_ROOT_DIR=C:\Program Files\OpenSSL-Win64" >> $env:GITHUB_ENV

      - name: Clone PostgreSQL (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          git clone --depth 1 --branch $env:PG_VERSION https://github.com/postgres/postgres.git pg-source
          Write-Host "PostgreSQL source cloned: $env:PG_VERSION"

      - name: Build PostgreSQL with Meson (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          # Run meson/ninja inside a VS developer command prompt so MSVC is available
          $sslOpt = if ('${{ inputs.ssl }}' -eq 'true') { '-Dssl=openssl' } else { '-Dssl=none' }
          $installDir = $env:PG_INSTALL_DIR -replace '\\', '/'

          $script = @"
          @echo off
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" > nul
          cd pg-source
          meson setup build --prefix=$installDir --buildtype=release $sslOpt -Dcassert=false -Dzlib=disabled -Dnls=disabled -Dplperl=disabled -Dpltcl=disabled -Dplpython=disabled -Dldap=disabled -Dgssapi=disabled -Dicu=disabled -Dllvm=disabled -Dselinux=disabled -Dsystemd=disabled -Duuid=none -Dreadline=disabled -Dlibedit_preferred=false -Dpgport=15432
          if %ERRORLEVEL% NEQ 0 exit /b %ERRORLEVEL%
          ninja -C build
          if %ERRORLEVEL% NEQ 0 exit /b %ERRORLEVEL%
          ninja -C build install
          if %ERRORLEVEL% NEQ 0 exit /b %ERRORLEVEL%
          "@
          $script | Out-File -FilePath "$env:RUNNER_TEMP\build-pg.bat" -Encoding ASCII
          cmd /c "$env:RUNNER_TEMP\build-pg.bat"
          if ($LASTEXITCODE -ne 0) { throw "PG build failed" }
          Write-Host "PostgreSQL installed to: $env:PG_INSTALL_DIR"

      - name: Build pgvector (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          git clone --depth 1 --branch $env:PGVECTOR_VERSION https://github.com/pgvector/pgvector.git pgvector-source
          cd pgvector-source

          $env:PATH = "$env:PG_INSTALL_DIR\bin;$env:PATH"
          $env:PG_INSTALL_DIR_BS = $env:PG_INSTALL_DIR -replace '\\', '/'

          $script = @"
          @echo off
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" > nul
          cd pgvector-source
          set PATH=%PG_INSTALL_DIR%\bin;%PATH%
          set PG_INSTALL_DIR=$env:PG_INSTALL_DIR_BS
          nmake /F Makefile.win
          if %ERRORLEVEL% NEQ 0 exit /b %ERRORLEVEL%
          nmake /F Makefile.win install
          if %ERRORLEVEL% NEQ 0 exit /b %ERRORLEVEL%
          "@
          $script | Out-File -FilePath "$env:RUNNER_TEMP\build-pgvector.bat" -Encoding ASCII
          cmd /c "$env:RUNNER_TEMP\build-pgvector.bat"
          if ($LASTEXITCODE -ne 0) { throw "pgvector build failed" }
          Write-Host "pgvector installed"

      - name: Test PostgreSQL + pgvector (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $env:PATH = "$env:PG_INSTALL_DIR\bin;$env:PATH"

          # Initialize database cluster
          initdb.exe -D $env:RUNNER_TEMP\pgdata --no-locale --encoding=UTF8 --auth=trust --username="$env:USERNAME"

          # Minimal postgresql.conf for testing
          Add-Content "$env:RUNNER_TEMP\pgdata\postgresql.conf" "listen_addresses = '127.0.0.1'"
          Add-Content "$env:RUNNER_TEMP\pgdata\postgresql.conf" "max_connections = 5"
          Add-Content "$env:RUNNER_TEMP\pgdata\postgresql.conf" "shared_preload_libraries = ''"
          Add-Content "$env:RUNNER_TEMP\pgdata\pg_hba.conf" "host all all 127.0.0.1/32 trust"

          # Start PostgreSQL
          pg_ctl.exe start -D $env:RUNNER_TEMP\pgdata -l "$env:RUNNER_TEMP\pg.log" -w -t 30

          if (Get-Content "$env:RUNNER_TEMP\pg.log" | Select-String "database system is ready") {
            Write-Host "PostgreSQL started successfully"
          } else {
            Get-Content "$env:RUNNER_TEMP\pg.log"
            throw "PostgreSQL failed to start"
          }

          # Create test database
          createdb.exe -h 127.0.0.1 -p 15432 -U "$env:USERNAME" testdb

          # Test pgvector extension
          psql.exe -h 127.0.0.1 -p 15432 -U "$env:USERNAME" -d testdb -c "CREATE EXTENSION vector;"
          psql.exe -h 127.0.0.1 -p 15432 -U "$env:USERNAME" -d testdb -c "SELECT '[1,2,3]'::vector;"

          # Functional test
          psql.exe -h 127.0.0.1 -p 15432 -U "$env:USERNAME" -d testdb -c "CREATE TABLE items (id serial PRIMARY KEY, embedding vector(3));"
          psql.exe -h 127.0.0.1 -p 15432 -U "$env:USERNAME" -d testdb -c "INSERT INTO items (embedding) VALUES ('[1,2,3]'), ('[4,5,6]'), ('[2,3,4]');"
          psql.exe -h 127.0.0.1 -p 15432 -U "$env:USERNAME" -d testdb -c "SELECT id, embedding, embedding <-> '[3,1,2]'::vector AS distance FROM items ORDER BY distance;"

          # Verify index creation works
          psql.exe -h 127.0.0.1 -p 15432 -U "$env:USERNAME" -d testdb -c "CREATE INDEX ON items USING ivfflat (embedding vector_l2_ops) WITH (lists = 1);"

          pg_ctl.exe stop -D $env:RUNNER_TEMP\pgdata -m fast
          Write-Host "All Windows tests passed!"

      - name: Package artifact (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $artifactDir = "$env:RUNNER_TEMP\$env:ARTIFACT_NAME"
          Move-Item -Path $env:PG_INSTALL_DIR -Destination $artifactDir

          # Strip development files
          Remove-Item -Recurse -Force "$artifactDir\include" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$artifactDir\doc" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$artifactDir\share\doc" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$artifactDir\share\man" -ErrorAction SilentlyContinue

          Compress-Archive -Path $artifactDir -DestinationPath "$env:RUNNER_TEMP\$env:ARTIFACT_NAME.zip" -CompressionLevel Optimal
          $size = (Get-Item "$env:RUNNER_TEMP\$env:ARTIFACT_NAME.zip").Length / 1MB
          Write-Host "Packaged: $env:RUNNER_TEMP\$env:ARTIFACT_NAME.zip ($([math]::Round($size,1)) MB)"

      # ==================== MACOS ====================
      - name: Install build tools (macOS)
        if: matrix.os == 'macos'
        run: |
          brew install meson ninja pkg-config
          if [ "${{ inputs.ssl }}" = "true" ]; then
            brew install openssl
            echo "PKG_CONFIG_PATH=$(brew --prefix openssl)/lib/pkgconfig" >> $GITHUB_ENV
          fi

      - name: Clone PostgreSQL (macOS)
        if: matrix.os == 'macos'
        run: |
          git clone --depth 1 --branch $PG_VERSION https://github.com/postgres/postgres.git pg-source

      - name: Build PostgreSQL with Meson (macOS)
        if: matrix.os == 'macos'
        run: |
          cd pg-source

          SSL_OPT="none"
          if [ "${{ inputs.ssl }}" = "true" ]; then
            SSL_OPT="openssl"
          fi

          meson setup build \
            --prefix="$PG_INSTALL_DIR" \
            --buildtype=release \
            -Dssl=$SSL_OPT \
            -Dcassert=false \
            -Dzlib=enabled \
            -Dnls=disabled \
            -Dplperl=disabled \
            -Dpltcl=disabled \
            -Dplpython=disabled \
            -Dldap=disabled \
            -Dgssapi=disabled \
            -Dicu=disabled \
            -Dllvm=disabled \
            -Dselinux=disabled \
            -Dsystemd=disabled \
            -Duuid=e2fs \
            -Dreadline=disabled \
            -Dlibedit_preferred=false \
            -Dpgport=15432

          ninja -C build
          ninja -C build install

      - name: Fix macOS library paths (macOS)
        if: matrix.os == 'macos'
        run: |
          # Make PG relocatable: fix dylib install names to use @loader_path
          for lib in "$PG_INSTALL_DIR/lib/"*.dylib; do
            if [ -f "$lib" ] && [ ! -L "$lib" ]; then
              install_name_tool -id "@loader_path/$(basename "$lib")" "$lib" 2>/dev/null || true
            fi
          done
          # Fix executables
          for bin in "$PG_INSTALL_DIR/bin/"*; do
            if [ -f "$bin" ] && file "$bin" | grep -q Mach-O; then
              for lib in "$PG_INSTALL_DIR/lib/"*.dylib; do
                libname=$(basename "$lib")
                if otool -L "$bin" 2>/dev/null | grep -q "$libname"; then
                  install_name_tool -change "$lib" "@executable_path/../lib/$libname" "$bin" 2>/dev/null || true
                fi
              done
            fi
          done
          echo "Library paths fixed for relocatable build"

      - name: Build pgvector (macOS)
        if: matrix.os == 'macos'
        run: |
          git clone --depth 1 --branch $PGVECTOR_VERSION https://github.com/pgvector/pgvector.git pgvector-source
          cd pgvector-source
          export PATH="$PG_INSTALL_DIR/bin:$PATH"
          make OPTFLAGS="-O2"
          make install

      - name: Test PostgreSQL + pgvector (macOS)
        if: matrix.os == 'macos'
        run: |
          export PATH="$PG_INSTALL_DIR/bin:$PATH"
          export DYLD_LIBRARY_PATH="$PG_INSTALL_DIR/lib"

          # Initialize database cluster
          initdb -D "$RUNNER_TEMP/pgdata" --no-locale --encoding=UTF8 --auth=trust --username="$(whoami)"

          # Minimal postgresql.conf for testing
          cat >> "$RUNNER_TEMP/pgdata/postgresql.conf" <<'PGEOCONF'
          listen_addresses = '127.0.0.1'
          max_connections = 5
          shared_preload_libraries = ''
          PGEOCONF

          # Start PostgreSQL
          pg_ctl start -D "$RUNNER_TEMP/pgdata" -l "$RUNNER_TEMP/pg.log" -w -t 30

          if grep -q "database system is ready" "$RUNNER_TEMP/pg.log"; then
            echo "PostgreSQL started successfully"
          else
            cat "$RUNNER_TEMP/pg.log"
            exit 1
          fi

          # Create test database
          createdb -h 127.0.0.1 -p 15432 -U "$(whoami)" testdb

          # Test pgvector extension
          psql -h 127.0.0.1 -p 15432 -U "$(whoami)" -d testdb -c "CREATE EXTENSION vector;"
          psql -h 127.0.0.1 -p 15432 -U "$(whoami)" -d testdb -c "SELECT '[1,2,3]'::vector;"

          # Functional test
          psql -h 127.0.0.1 -p 15432 -U "$(whoami)" -d testdb -c "CREATE TABLE items (id serial PRIMARY KEY, embedding vector(3));"
          psql -h 127.0.0.1 -p 15432 -U "$(whoami)" -d testdb -c "INSERT INTO items (embedding) VALUES ('[1,2,3]'), ('[4,5,6]'), ('[2,3,4]');"
          psql -h 127.0.0.1 -p 15432 -U "$(whoami)" -d testdb -c "SELECT id, embedding, embedding <-> '[3,1,2]'::vector AS distance FROM items ORDER BY distance;"
          psql -h 127.0.0.1 -p 15432 -U "$(whoami)" -d testdb -c "CREATE INDEX ON items USING ivfflat (embedding vector_l2_ops) WITH (lists = 1);"

          pg_ctl stop -D "$RUNNER_TEMP/pgdata" -m fast
          echo "All macOS tests passed!"

      - name: Package artifact (macOS)
        if: matrix.os == 'macos'
        run: |
          ARTIFACT_DIR="$RUNNER_TEMP/$ARTIFACT_NAME"
          mv "$PG_INSTALL_DIR" "$ARTIFACT_DIR"

          # Strip development files
          rm -rf "$ARTIFACT_DIR/include"
          rm -rf "$ARTIFACT_DIR/doc"
          rm -rf "$ARTIFACT_DIR/share/doc"
          rm -rf "$ARTIFACT_DIR/share/man"

          cd "$RUNNER_TEMP"
          zip -r -9 "$ARTIFACT_NAME.zip" "$ARTIFACT_NAME"
          size_mb=$(du -m "$ARTIFACT_NAME.zip" | cut -f1)
          echo "Packaged: $RUNNER_TEMP/$ARTIFACT_NAME.zip (${size_mb} MB)"

      # ==================== UPLOAD & RELEASE ====================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ runner.temp }}/${{ env.ARTIFACT_NAME }}.zip
          retention-days: 7

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: ${{ runner.temp }}/${{ env.ARTIFACT_NAME }}.zip
          tag: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          makeLatest: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push git tag
        if: matrix.os == 'macos'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$RELEASE_TAG"
          git push -f origin "$RELEASE_TAG"
          echo "Pushed tag: $RELEASE_TAG"
